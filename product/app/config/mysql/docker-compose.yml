services:
  mysql:
    image: mysql:8.0.36
    container_name: astock-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: astock-root-password
      MYSQL_DATABASE: astock
      MYSQL_USER: astock
      MYSQL_PASSWORD: astock-local-password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql-data:
